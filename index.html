<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1008 1296" width="1008" height="1296">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <linearGradient id="jamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <linearGradient id="umbrellaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc00"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1008" height="1296" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1008" y2="1296" stroke="white" stroke-width="0.5"/>
    <line x1="1008" y1="0" x2="0" y2="1296" stroke="white" stroke-width="0.5"/>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.3"/>
    </pattern>
    <rect width="1008" height="1296" fill="url(#grid)"/>
  </g>

  <!-- TITLE SECTION -->
  <rect x="0" y="0" width="1008" height="140" fill="rgba(0,0,0,0.7)"/>
  <text x="504" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#00ff88" text-anchor="middle" filter="url(#glow)">⚡ DUAL LAYER AIR DEFENSE SYSTEM ⚡</text>
  <text x="504" y="95" font-family="Arial, sans-serif" font-size="18" fill="#ccccdd" text-anchor="middle">Next-Generation Hybrid Protection — Quantum Radar + Mass Micro-Artillery Umbrella</text>
  <line x1="100" y1="115" x2="908" y2="115" stroke="#00ff88" stroke-width="1" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- PART 1: DESCRIPTION PANEL (Top section) -->
  <!-- ============================================ -->
  <rect x="30" y="160" width="948" height="300" rx="15" fill="rgba(0,0,0,0.6)" stroke="#00ff88" stroke-width="1.5"/>

  <!-- Layer 1 Badge -->
  <rect x="50" y="175" width="180" height="40" rx="20" fill="url(#radarGrad)" opacity="0.2" stroke="#00ff88" stroke-width="1"/>
  <text x="140" y="202" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff88" text-anchor="middle">🔍 LAYER 1: RADAR + JAMMER</text>

  <!-- Radar description -->
  <text x="50" y="240" font-family="Arial, sans-serif" font-size="13" fill="#ddddff">
    <tspan x="50" dy="0" font-weight="bold" fill="#00ff88">▶ QUANTUM ENTANGLEMENT RADAR (QR-7):</tspan>
    <tspan x="65" dy="22">Unlike conventional radars, our QR-7 uses quantum-entangled photon pairs to detect stealth</tspan>
    <tspan x="65" dy="18">aircraft and hypersonic missiles. It cannot be jammed or deceived by electronic warfare</tspan>
    <tspan x="65" dy="18">systems. Detection range: 500km with 0.001m resolution. Penetrates all stealth coatings.</tspan>
  </text>

  <!-- Jammer description -->
  <text x="50" y="340" font-family="Arial, sans-serif" font-size="13" fill="#ddddff">
    <tspan x="50" dy="0" font-weight="bold" fill="#ff3366">▶ COORDINATE LOCK JAMMER (CLJ-X9):</tspan>
    <tspan x="65" dy="22">Modern missiles use GPS/inertial coordinate locks. Our CLJ-X9 generates a localized</tspan>
    <tspan x="65" dy="18">spacetime distortion bubble that scrambles all coordinate reference frames. Missiles</tspan>
    <tspan x="65" dy="18">lose "where up is" — they spiral harmlessly or self-destruct due to navigation errors.</tspan>
  </text>

  <line x1="50" y1="375" x2="958" y2="375" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <!-- Layer 2 Badge -->
  <rect x="600" y="380" width="200" height="40" rx="20" fill="url(#umbrellaGrad)" opacity="0.2" stroke="#ffcc00" stroke-width="1"/>
  <text x="700" y="407" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffcc00" text-anchor="middle">☂️ LAYER 2: UMBRELLA SYSTEM</text>

  <text x="50" y="420" font-family="Arial, sans-serif" font-size="13" fill="#ddddff">
    <tspan x="50" dy="0" font-weight="bold" fill="#ffcc00">▶ MICRO-ARTILLERY UMBRELLA (MAU-500):</tspan>
    <tspan x="65" dy="22">If Layer 1 fails, an invisible "umbrella shield" activates. Within 5km radius, 500 micro-</tspan>
    <tspan x="65" dy="18">rockets (10kg each) launch simultaneously from a single artillery battery. Propellant:</tspan>
    <tspan x="65" dy="18">Potassium nitrate + sugar (cost-optimized). Each rocket carries a small explosive charge.</tspan>
    <tspan x="65" dy="22" font-weight="bold" fill="#ffaa00">▶ GYROSCOPE SAFETY SYSTEM:</tspan>
    <tspan x="65" dy="22">Every rocket has a MEMS gyroscope. If deviation toward ground is detected, the rocket</tspan>
    <tspan x="65" dy="18">auto-detonates at safe altitude (100m+). Zero civilian casualty risk.</tspan>
  </text>

  <!-- ============================================ -->
  <!-- MAIN VISUAL: Two Layer Defense (Middle section) -->
  <!-- ============================================ -->

  <!-- Ground / Base -->
  <rect x="0" y="750" width="1008" height="4" fill="#00ff88" opacity="0.4"/>
  <rect x="0" y="754" width="1008" height="20" fill="rgba(0,40,20,0.5)"/>

  <!-- === LAYER 1: RADAR STATION (Left) === -->
  <g transform="translate(180, 520)">
    <!-- Radar tower -->
    <rect x="-10" y="0" width="20" height="180" fill="rgba(100,100,150,0.6)" rx="3"/>
    <!-- Radar dish -->
    <ellipse cx="0" cy="-20" rx="60" ry="15" fill="none" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
    <ellipse cx="0" cy="-20" rx="40" ry="10" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="-20" x2="0" y2="-80" stroke="#00ff88" stroke-width="1.5"/>
    <!-- Quantum waves -->
    <circle cx="0" cy="-20" r="80" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="80;120;160;200;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.05;0.02;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-20" r="120" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.2">
      <animate attributeName="r" values="120;160;200;240;120" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.05;0.01;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-20" r="160" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.1">
      <animate attributeName="r" values="160;200;240;280;160" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Label -->
    <text x="0" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ff88" text-anchor="middle">QUANTUM RADAR</text>
    <text x="0" y="218" font-family="Arial, sans-serif" font-size="10" fill="#88ffaa" text-anchor="middle">QR-7</text>
  </g>

  <!-- === LAYER 1: JAMMER STATION (Right of radar) === -->
  <g transform="translate(420, 520)">
    <!-- Jammer tower -->
    <rect x="-8" y="0" width="16" height="180" fill="rgba(150,50,80,0.6)" rx="3"/>
    <!-- Jammer dome -->
    <circle cx="0" cy="-30" r="30" fill="rgba(255,51,102,0.15)" stroke="#ff3366" stroke-width="2" filter="url(#glow)"/>
    <circle cx="0" cy="-30" r="45" fill="none" stroke="#ff3366" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="45;55;65;75;45" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.1;0.05;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Distortion effect -->
    <text x="0" cy="-30" font-family="Arial" font-size="24" fill="#ff6699" text-anchor="middle" opacity="0.6" y="0">🌀</text>
    <!-- Label -->
    <text x="0" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff3366" text-anchor="middle">COORDINATE JAMMER</text>
    <text x="0" y="218" font-family="Arial, sans-serif" font-size="10" fill="#ff88aa" text-anchor="middle">CLJ-X9 (Spacetime Distortion)</text>
  </g>

  <!-- Incoming missile (Layer 1 being targeted) -->
  <g transform="translate(780, 420)">
    <!-- Missile body -->
    <polygon points="0,-5 15,0 0,5 -5,0" fill="#ff4444"/>
    <line x1="15" y1="0" x2="40" y2="0" stroke="#ff4444" stroke-width="2"/>
    <circle cx="40" cy="0" r="3" fill="#ff8888"/>
    <!-- Navigation lines (confused by jammer) -->
    <path d="M40,0 Q100,-30 150,10 Q200,50 250,-20" fill="none" stroke="#ff8888" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <text x="20" y="-12" font-family="Arial" font-size="9" fill="#ff8888">INCOMING</text>
  </g>

  <!-- Arrows showing Layer 1 intercept attempt -->
  <g opacity="0.7">
    <line x1="300" y1="450" x2="700" y2="430" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="8,4"/>
    <polygon points="700,430 690,425 692,435" fill="#00ff88"/>
    <text x="480" y="425" font-family="Arial" font-size="11" fill="#00ff88" text-anchor="middle">Detection &amp; Jamming</text>
  </g>

  <!-- If Layer 1 fails - arrow to Layer 2 -->
  <g>
    <line x1="700" y1="460" x2="700" y2="560" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="700,560 693,550 707,550" fill="#ff6600"/>
    <text x="720" y="510" font-family="Arial" font-size="11" fill="#ffaa66">if bypassed...</text>
  </g>

  <!-- === LAYER 2: UMBRELLA SYSTEM === -->
  <g transform="translate(504, 640)">
    <!-- Umbrella dome (large semicircular shield) -->
    <path d="M-200,0 Q-180,-180 0,-220 Q180,-180 200,0" fill="rgba(255,204,0,0.08)" stroke="#ffcc00" stroke-width="2" stroke-dasharray="10,5" filter="url(#glowStrong)"/>

    <!-- Umbrella handle / central tower -->
    <line x1="0" y1="-220" x2="0" y2="-50" stroke="#ffaa00" stroke-width="3"/>
    <circle cx="0" cy="-220" r="8" fill="#ffcc00" opacity="0.6"/>

    <!-- 500 rockets launching (represented as multiple lines) -->
    <g opacity="0.9">
      <!-- Rocket volley 1 -->
      <line x1="-150" y1="-30" x2="-180" y2="-120" stroke="#ffaa33" stroke-width="1.5">
        <animate attributeName="y2" values="-120;-200;-280" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="y1" values="-30;-40;-50" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="-120" y1="-30" x2="-140" y2="-130" stroke="#ffbb44" stroke-width="1.5">
        <animate attributeName="y2" values="-130;-210;-290" dur="0.9s" repeatCount="indefinite"/>
      </line>
      <line x1="-90" y1="-30" x2="-100" y2="-140" stroke="#ffcc55" stroke-width="1.5">
        <animate attributeName="y2" values="-140;-220;-300" dur="1.1s" repeatCount="indefinite"/>
      </line>
      <line x1="-60" y1="-30" x2="-60" y2="-150" stroke="#ffdd66" stroke-width="1.5">
        <animate attributeName="y2" values="-150;-230;-310" dur="0.8s" repeatCount="indefinite"/>
      </line>
      <line x1="-30" y1="-30" x2="-20" y2="-160" stroke="#ffee77" stroke-width="1.5">
        <animate attributeName="y2" values="-160;-240;-320" dur="1.05s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="-30" x2="0" y2="-170" stroke="#ffcc00" stroke-width="1.5">
        <animate attributeName="y2" values="-170;-250;-330" dur="0.95s" repeatCount="indefinite"/>
      </line>
      <line x1="30" y1="-30" x2="40" y2="-160" stroke="#ffdd66" stroke-width="1.5">
        <animate attributeName="y2" values="-160;-240;-320" dur="1.02s" repeatCount="indefinite"/>
      </line>
      <line x1="60" y1="-30" x2="80" y2="-150" stroke="#ffcc55" stroke-width="1.5">
        <animate attributeName="y2" values="-150;-230;-310" dur="0.88s" repeatCount="indefinite"/>
      </line>
      <line x1="90" y1="-30" x2="110" y2="-140" stroke="#ffbb44" stroke-width="1.5">
        <animate attributeName="y2" values="-140;-220;-300" dur="1.12s" repeatCount="indefinite"/>
      </line>
      <line x1="120" y1="-30" x2="150" y2="-130" stroke="#ffaa33" stroke-width="1.5">
        <animate attributeName="y2" values="-130;-210;-290" dur="0.92s" repeatCount="indefinite"/>
      </line>
      <line x1="150" y1="-30" x2="190" y2="-120" stroke="#ff9922" stroke-width="1.5">
        <animate attributeName="y2" values="-120;-200;-280" dur="1.08s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Rocket exhaust particles -->
    <g opacity="0.6">
      <circle cx="-180" cy="-125" r="2" fill="#ff6600">
        <animate attributeName="cy" values="-125;-205;-285" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.3;0" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="190" cy="-125" r="2" fill="#ff6600">
        <animate attributeName="cy" values="-125;-205;-285" dur="1.08s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.3;0" dur="1.08s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Label -->
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffcc00" text-anchor="middle">☂️ MAU-500 UMBRELLA SYSTEM</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="11" fill="#ffdd88" text-anchor="middle">500 Micro-Rockets per Salvo | 10kg each | KNO₃ + Sugar Propellant</text>

    <!-- Gyroscope safety badge -->
    <rect x="-80" y="60" width="160" height="25" rx="12" fill="rgba(255,204,0,0.2)" stroke="#ffcc00" stroke-width="0.8"/>
    <text x="0" y="77" font-family="Arial, sans-serif" font-size="10" fill="#ffdd88" text-anchor="middle">⚙️ Gyro-Safe: Auto-detonate on ground deviation</text>
  </g>

  <!-- Hostile aircraft/missile being intercepted by Layer 2 -->
  <g transform="translate(780, 580)">
    <polygon points="0,-4 12,0 0,4 -4,0" fill="#ff2222"/>
    <line x1="12" y1="0" x2="35" y2="0" stroke="#ff2222" stroke-width="1.5"/>
    <circle cx="35" cy="0" r="2.5" fill="#ff6666"/>
  </g>

  <!-- Layer 2 interceptions lines -->
  <line x1="680" y1="530" x2="770" y2="575" stroke="#ffcc00" stroke-width="1" stroke-dasharray="5,3" opacity="0.8"/>
  <line x1="650" y1="510" x2="760" y2="565" stroke="#ffcc00" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="620" y1="500" x2="750" y2="555" stroke="#ffcc00" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Explosion effect -->
  <g transform="translate(790, 570)" opacity="0.7">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ff6600" stroke-width="2"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.5"/>
    <text x="0" y="2" font-family="Arial" font-size="12" fill="#ffaa33" text-anchor="middle">💥</text>
  </g>

  <!-- ============================================ -->
  <!-- BOTTOM INFO PANEL (Stats & Features) -->
  <!-- ============================================ -->
  <rect x="30" y="900" width="948" height="150" rx="15" fill="rgba(0,0,0,0.6)" stroke="#ffcc00" stroke-width="1"/>

  <text x="504" y="930" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffcc00" text-anchor="middle">📊 SYSTEM SPECIFICATIONS</text>

  <!-- Stats boxes -->
  <rect x="60" y="950" width="200" height="80" rx="8" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="1"/>
  <text x="160" y="975" font-family="Arial, sans-serif" font-size="12" fill="#00ff88" text-anchor="middle">Detection Range</text>
  <text x="160" y="1000" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">500 km</text>
  <text x="160" y="1018" font-family="Arial, sans-serif" font-size="10" fill="#88ffaa" text-anchor="middle">Quantum Resolution: 0.001m</text>

  <rect x="280" y="950" width="200" height="80" rx="8" fill="rgba(255,51,102,0.1)" stroke="#ff3366" stroke-width="1"/>
  <text x="380" y="975" font-family="Arial, sans-serif" font-size="12" fill="#ff3366" text-anchor="middle">Jammer Effect</text>
  <text x="380" y="1000" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">100% Lock Disruption</text>
  <text x="380" y="1018" font-family="Arial, sans-serif" font-size="10" fill="#ff88aa" text-anchor="middle">Spacetime Distortion Bubble</text>

  <rect x="500" y="950" width="200" height="80" rx="8" fill="rgba(255,204,0,0.1)" stroke="#ffcc00" stroke-width="1"/>
  <text x="600" y="975" font-family="Arial, sans-serif" font-size="12" fill="#ffcc00" text-anchor="middle">Firepower</text>
  <text x="600" y="1000" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">500 Rockets/Salvo</text>
  <text x="600" y="1018" font-family="Arial, sans-serif" font-size="10" fill="#ffdd88" text-anchor="middle">10kg each | Cost-Optimized</text>

  <rect x="720" y="950" width="200" height="80" rx="8" fill="rgba(0,200,255,0.1)" stroke="#00ccff" stroke-width="1"/>
  <text x="820" y="975" font-family="Arial, sans-serif" font-size="12" fill="#00ccff" text-anchor="middle">Safety System</text>
  <text x="820" y="1000" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Zero Civilian Risk</text>
  <text x="820" y="1018" font-family="Arial, sans-serif" font-size="10" fill="#88ddff" text-anchor="middle">MEMS Gyroscope Auto-Detonate</text>

  <!-- ============================================ -->
  <!-- BOTTOM LABEL / FOOTER -->
  <!-- ============================================ -->
  <rect x="0" y="1070" width="1008" height="226" fill="rgba(0,0,0,0.5)"/>
  <text x="504" y="1110" font-family="Arial, sans-serif" font-size="14" fill="#8888aa" text-anchor="middle">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <text x="504" y="1150" font-family="Arial, sans-serif" font-size="13" fill="#aaaacc" text-anchor="middle">
    "When the first layer sees everything and jams all coordinates, the second layer catches whatever remains — an impenetrable shield."
  </text>

  <text x="504" y="1190" font-family="Arial, sans-serif" font-size="11" fill="#666688" text-anchor="middle">
    ⚡ 2-Layer Quantum Radar + Micro-Artillery Umbrella System | Deployable Anywhere | 360° Protection ⚡
  </text>

  <text x="504" y="1230" font-family="Arial, sans-serif" font-size="10" fill="#444466" text-anchor="middle">
    * Specifications are based on next-generation defense concept | Patent Pending
  </text>

  <!-- Corner decorations -->
  <rect x="10" y="10" width="30" height="30" fill="none" stroke="#00ff88" stroke-width="2"/>
  <rect x="968" y="10" width="30" height="30" fill="none" stroke="#00ff88" stroke-width="2"/>
  <rect x="10" y="1256" width="30" height="30" fill="none" stroke="#ffcc00" stroke-width="2"/>
  <rect x="968" y="1256" width="30" height="30" fill="none" stroke="#ffcc00" stroke-width="2"/>

</svg>
